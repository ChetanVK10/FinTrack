  </defs>
  <rect x="10" y="10" width="80" height="80" rx="20" fill="url(#grad)" filter="url(#glow)"/>
  <path d="M30 55 L45 40 L55 50 L70 30" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
